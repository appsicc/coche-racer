<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Racing Game 3D - Pack 2</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      overflow: hidden;
      background: #02030a;
      font-family: Arial, sans-serif;
      color: white;
      touch-action: none;
    }

    canvas { display: block; }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(0, 180, 255, 0.45);
      background: rgba(0, 0, 0, 0.48);
      border-radius: 12px;
      font-size: 14px;
      z-index: 10;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(0, 150, 255, 0.25);
      min-width: 190px;
    }

    #hud strong { color: #34c9ff; }
    #hud .pack2 { color: #ffb84d; }

    #menu {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      background:
        radial-gradient(circle at center, rgba(255, 138, 0, 0.18), rgba(0, 0, 0, 0.94)),
        linear-gradient(135deg, rgba(0, 0, 30, 0.85), rgba(0, 0, 0, 0.96));
    }

    .menu-card {
      width: min(92vw, 560px);
      padding: 28px;
      border-radius: 22px;
      border: 1px solid rgba(255, 170, 50, 0.68);
      background: rgba(0, 0, 0, 0.58);
      text-align: center;
      box-shadow: 0 0 35px rgba(255, 140, 0, 0.30);
    }

    .menu-card h1 {
      margin: 0 0 8px;
      font-size: 40px;
      letter-spacing: 1px;
    }

    .menu-card h1 span { color: #ffb84d; }

    .menu-card p {
      margin: 8px 0;
      color: #ffe0b0;
      line-height: 1.45;
    }

    .menu-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .menu-card button {
      width: 100%;
      padding: 15px 16px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(90deg, #ff7a00, #ffd166);
      color: #1b0e00;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(255, 160, 0, 0.4);
    }

    .menu-card button.blue {
      background: linear-gradient(90deg, #007bff, #00d4ff);
      color: white;
    }

    #message {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      max-width: 280px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff4dc;
      font-size: 13px;
    }

    #mobileControls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: end;
      padding: 0 18px;
      z-index: 20;
      pointer-events: none;
    }

    .control-group {
      display: flex;
      gap: 12px;
      pointer-events: auto;
    }

    .control-btn {
      width: 68px;
      height: 68px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 50%;
      background: rgba(255, 130, 0, 0.58);
      color: white;
      font-size: 28px;
      font-weight: bold;
      box-shadow: 0 0 18px rgba(255, 140, 0, 0.42);
      backdrop-filter: blur(8px);
      user-select: none;
    }

    .control-btn.nitro {
      background: rgba(0, 160, 255, 0.62);
      font-size: 18px;
    }

    .control-btn:active {
      transform: scale(0.95);
      background: rgba(255, 200, 0, 0.78);
    }

    @media (min-width: 900px) {
      #mobileControls { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><strong id="packName">PACK 2:</strong> <span id="mapName">Desierto Neon</span></div>
    <div>Velocidad: <span id="speed">0</span> km/h</div>
    <div>Monedas: <span id="coins">0</span></div>
    <div>Nitro: <span id="nitro">100</span>%</div>
  </div>

  <div id="message">
    PC: W/S acelerar-frenar, A/D girar, ESPACIO nitro. Móvil: botones.
  </div>

  <div id="menu">
    <div class="menu-card">
      <h1>RACING <span>GAME</span></h1>
      <p>Versión 2: ahora con <b>Pack 1</b> y <b>Pack 2</b>.</p>
      <p>Pack 2 añade desierto industrial, nitro, rampas y ambiente naranja/neón.</p>
      <div class="menu-row">
        <button class="blue" id="pack1Btn">JUGAR PACK 1</button>
        <button id="pack2Btn">JUGAR PACK 2</button>
      </div>
    </div>
  </div>

  <div id="mobileControls">
    <div class="control-group">
      <button class="control-btn" id="leftBtn">←</button>
      <button class="control-btn" id="rightBtn">→</button>
    </div>
    <div class="control-group">
      <button class="control-btn nitro" id="nitroBtn">NITRO</button>
      <button class="control-btn" id="brakeBtn">↓</button>
      <button class="control-btn" id="gasBtn">↑</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    let scene, camera, renderer, car;
    let speed = 0;
    let coins = 0;
    let nitro = 100;
    let currentPack = 2;
    let gameStarted = false;
    let road, rainParticles, dustParticles;

    const keys = { w: false, s: false, a: false, d: false, nitro: false };

    const speedEl = document.getElementById("speed");
    const coinsEl = document.getElementById("coins");
    const nitroEl = document.getElementById("nitro");
    const packNameEl = document.getElementById("packName");
    const mapNameEl = document.getElementById("mapName");
    const menu = document.getElementById("menu");

    const worldObjects = [];
    const obstacles = [];
    const coins3d = [];
    const ramps = [];
    const roadLines = [];

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
      document.body.appendChild(renderer.domElement);

      window.addEventListener("resize", onResize);
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);

      setupButton("gasBtn", "w");
      setupButton("brakeBtn", "s");
      setupButton("leftBtn", "a");
      setupButton("rightBtn", "d");
      setupButton("nitroBtn", "nitro");

      document.getElementById("pack1Btn").addEventListener("click", () => startGame(1));
      document.getElementById("pack2Btn").addEventListener("click", () => startGame(2));

      buildWorld(2);
      camera.position.set(0, 5.5, 12);
      camera.lookAt(0, 0.8, 0);
    }

    function startGame(pack) {
      currentPack = pack;
      gameStarted = true;
      menu.style.display = "none";
      buildWorld(pack);
    }

    function clearWorld() {
      worldObjects.forEach(obj => scene.remove(obj));
      worldObjects.length = 0;
      obstacles.length = 0;
      coins3d.length = 0;
      ramps.length = 0;
      roadLines.length = 0;
      speed = 0;
      coins = 0;
      nitro = 100;
    }

    function add(obj) {
      scene.add(obj);
      worldObjects.push(obj);
      return obj;
    }

    function buildWorld(pack) {
      clearWorld();

      if (pack === 1) {
        scene.background = new THREE.Color(0x030511);
        scene.fog = new THREE.Fog(0x030511, 35, 150);
        packNameEl.textContent = "PACK 1:";
        mapNameEl.textContent = "Ciudad Neon";
        document.getElementById("hud").querySelector("strong").className = "";
      } else {
        scene.background = new THREE.Color(0x180a02);
        scene.fog = new THREE.Fog(0x180a02, 38, 170);
        packNameEl.textContent = "PACK 2:";
        mapNameEl.textContent = "Desierto Industrial";
        document.getElementById("hud").querySelector("strong").className = "pack2";
      }

      createLights(pack);
      createRoad(pack);
      createCar(pack);
      createScenery(pack);
      createObstacles(pack);
      createCoins();
      createRamps(pack);
      createParticles(pack);

      car.position.set(0, 0, 6);
      car.rotation.set(0, 0, 0);
    }

    function createLights(pack) {
      add(new THREE.AmbientLight(pack === 1 ? 0x8fbfff : 0xffd19a, 0.8));

      const main = new THREE.DirectionalLight(0xffffff, 1.3);
      main.position.set(6, 12, 8);
      add(main);

      const a = new THREE.PointLight(pack === 1 ? 0x00aaff : 0xff8a00, 4.5, 55);
      a.position.set(-4, 5, 5);
      add(a);

      const b = new THREE.PointLight(pack === 1 ? 0xff00cc : 0x00aaff, 3.2, 55);
      b.position.set(5, 6, -14);
      add(b);
    }

    function createRoad(pack) {
      const roadMat = new THREE.MeshStandardMaterial({
        color: pack === 1 ? 0x101018 : 0x2a1710,
        roughness: pack === 1 ? 0.25 : 0.55,
        metalness: pack === 1 ? 0.15 : 0.05
      });

      road = add(new THREE.Mesh(new THREE.BoxGeometry(14, 0.25, 950), roadMat));
      road.position.set(0, -0.15, -280);

      const railMat = new THREE.MeshStandardMaterial({
        color: pack === 1 ? 0x004dff : 0xff7a00,
        emissive: pack === 1 ? 0x005dff : 0xff5a00,
        emissiveIntensity: 1.8
      });

      [-7.2, 7.2].forEach(x => {
        const rail = add(new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.2, 950), railMat));
        rail.position.set(x, 0.06, -280);
      });

      const lineMat = new THREE.MeshStandardMaterial({
        color: pack === 1 ? 0x00c8ff : 0xffd166,
        emissive: pack === 1 ? 0x00aaff : 0xff9500,
        emissiveIntensity: 1.4
      });

      for (let i = 0; i < 130; i++) {
        const line = add(new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.04, 4), lineMat));
        line.position.set(0, 0.03, 20 - i * 7);
        roadLines.push(line);
      }
    }

    function createCar(pack) {
      car = new THREE.Group();

      const black = new THREE.MeshStandardMaterial({ color: 0x050507, roughness: 0.22, metalness: 0.72 });
      const glass = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.1, metalness: 0.25 });
      const neonColor = pack === 1 ? 0x00bfff : 0xff9500;
      const neon = new THREE.MeshStandardMaterial({
        color: neonColor,
        emissive: neonColor,
        emissiveIntensity: 2.5
      });
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.35, metalness: 0.55 });

      const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.55, 4.2), black);
      body.position.y = 0.55;
      car.add(body);

      const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.55, 1.75), glass);
      cabin.position.set(0, 1.05, -0.35);
      car.add(cabin);

      const hood = new THREE.Mesh(new THREE.BoxGeometry(2.05, 0.18, 1.35), black);
      hood.position.set(0, 0.92, 1.05);
      car.add(hood);

      const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.12, 0.35), neon);
      spoiler.position.set(0, 1.05, -2.2);
      car.add(spoiler);

      const frontLight = new THREE.Mesh(new THREE.BoxGeometry(1.75, 0.08, 0.08), neon);
      frontLight.position.set(0, 0.76, 2.15);
      car.add(frontLight);

      [-1.25, 1.25].forEach(x => {
        const sideNeon = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 4.2), neon);
        sideNeon.position.set(x, 0.83, 0);
        car.add(sideNeon);
      });

      const wheelPositions = [[-1.25,0.22,1.25],[1.25,0.22,1.25],[-1.25,0.22,-1.25],[1.25,0.22,-1.25]];
      wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.28, 24), wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(pos[0], pos[1], pos[2]);
        car.add(wheel);

        const rim = new THREE.Mesh(new THREE.TorusGeometry(0.31, 0.025, 8, 30), neon);
        rim.rotation.y = Math.PI / 2;
        rim.position.set(pos[0] + (pos[0] > 0 ? 0.15 : -0.15), pos[1], pos[2]);
        car.add(rim);
      });

      add(car);
    }

    function createScenery(pack) {
      if (pack === 1) createCity();
      else createDesertIndustrial();
    }

    function createCity() {
      const buildingMat = new THREE.MeshStandardMaterial({ color: 0x121224, roughness: 0.45, metalness: 0.25 });
      const blueMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x008cff, emissiveIntensity: 2 });
      const pinkMat = new THREE.MeshStandardMaterial({ color: 0xff00cc, emissive: 0xff00cc, emissiveIntensity: 2 });

      for (let i = 0; i < 90; i++) {
        const h = 4 + Math.random() * 16;
        const building = add(new THREE.Mesh(new THREE.BoxGeometry(2.5, h, 2.5), buildingMat));
        const side = Math.random() > 0.5 ? 1 : -1;
        building.position.set(side * (10 + Math.random() * 22), h / 2 - 0.1, 15 - Math.random() * 460);

        const sign = add(new THREE.Mesh(new THREE.BoxGeometry(0.12, h * 0.55, 0.12), Math.random() > 0.5 ? blueMat : pinkMat));
        sign.position.set(building.position.x, building.position.y, building.position.z + 1.35);
      }
    }

    function createDesertIndustrial() {
      const sandMat = new THREE.MeshStandardMaterial({ color: 0x4a2a14, roughness: 0.85, metalness: 0.02 });
      const rockMat = new THREE.MeshStandardMaterial({ color: 0x6b3d20, roughness: 0.9 });
      const metalMat = new THREE.MeshStandardMaterial({ color: 0x231a18, roughness: 0.55, metalness: 0.35 });
      const orangeNeon = new THREE.MeshStandardMaterial({ color: 0xff8a00, emissive: 0xff6a00, emissiveIntensity: 2 });
      const blueNeon = new THREE.MeshStandardMaterial({ color: 0x00aaff, emissive: 0x008cff, emissiveIntensity: 1.7 });

      const ground = add(new THREE.Mesh(new THREE.BoxGeometry(110, 0.2, 950), sandMat));
      ground.position.set(0, -0.35, -280);

      for (let i = 0; i < 70; i++) {
        const side = Math.random() > 0.5 ? 1 : -1;
        const rock = add(new THREE.Mesh(
          new THREE.DodecahedronGeometry(1 + Math.random() * 2.5, 0),
          rockMat
        ));
        rock.scale.y = 0.5 + Math.random() * 1.4;
        rock.position.set(side * (11 + Math.random() * 36), rock.scale.y * 0.35, 10 - Math.random() * 500);
        rock.rotation.set(Math.random(), Math.random(), Math.random());
      }

      for (let i = 0; i < 24; i++) {
        const side = Math.random() > 0.5 ? 1 : -1;
        const tower = add(new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.9, 5 + Math.random() * 6, 12), metalMat));
        tower.position.set(side * (12 + Math.random() * 18), tower.geometry.parameters.height / 2, -5 - i * 18);

        const ring = add(new THREE.Mesh(new THREE.TorusGeometry(1.05, 0.04, 8, 24), Math.random() > 0.5 ? orangeNeon : blueNeon));
        ring.position.set(tower.position.x, tower.position.y + 1, tower.position.z);
        ring.rotation.x = Math.PI / 2;
      }

      for (let i = 0; i < 22; i++) {
        const side = Math.random() > 0.5 ? 1 : -1;
        const sign = add(new THREE.Mesh(new THREE.BoxGeometry(0.25, 2.2, 0.25), orangeNeon));
        sign.position.set(side * 7.8, 1.1, -12 - i * 20);
      }
    }

    function createObstacles(pack) {
      const mat = new THREE.MeshStandardMaterial({
        color: pack === 1 ? 0xff3333 : 0xff7a00,
        roughness: 0.4,
        metalness: 0.35
      });

      for (let i = 0; i < 30; i++) {
        const box = add(new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat));
        box.position.set(randomLane(), 0.5, -22 - i * 16);
        obstacles.push(box);
      }
    }

    function createCoins() {
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffcc00,
        emissive: 0xffaa00,
        emissiveIntensity: 1.2,
        roughness: 0.25,
        metalness: 0.8
      });

      for (let i = 0; i < 50; i++) {
        const coin = add(new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.09, 12, 28), mat));
        coin.rotation.x = Math.PI / 2;
        coin.position.set(randomLane(), 0.65, -15 - i * 10);
        coins3d.push(coin);
      }
    }

    function createRamps(pack) {
      const mat = new THREE.MeshStandardMaterial({
        color: pack === 1 ? 0x1a2b44 : 0x4d2b15,
        roughness: 0.35,
        metalness: 0.35
      });

      for (let i = 0; i < 9; i++) {
        const ramp = add(new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.35, 3), mat));
        ramp.position.set(randomLane(), 0.08, -55 - i * 48);
        ramp.rotation.x = -0.26;
        ramps.push(ramp);
      }
    }

    function createParticles(pack) {
      if (pack === 1) createRain();
      else createDust();
    }

    function createRain() {
      const geo = new THREE.BufferGeometry();
      const count = 800;
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        positions[i*3] = (Math.random() - 0.5) * 80;
        positions[i*3+1] = Math.random() * 45;
        positions[i*3+2] = 20 - Math.random() * 230;
      }

      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0x77ccff, size: 0.06, transparent: true, opacity: 0.55 });
      rainParticles = add(new THREE.Points(geo, mat));
    }

    function createDust() {
      const geo = new THREE.BufferGeometry();
      const count = 500;
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        positions[i*3] = (Math.random() - 0.5) * 90;
        positions[i*3+1] = Math.random() * 9;
        positions[i*3+2] = 20 - Math.random() * 260;
      }

      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      const mat = new THREE.PointsMaterial({ color: 0xffb066, size: 0.12, transparent: true, opacity: 0.32 });
      dustParticles = add(new THREE.Points(geo, mat));
    }

    function animate() {
      requestAnimationFrame(animate);

      if (gameStarted) {
        updateCar();
        updateCamera();
        updateCoins();
        updateRampJump();
        checkCollisions();
        updateParticles();
      } else if (car) {
        camera.position.set(0, 5.5, 12);
        camera.lookAt(0, 0.8, 0);
      }

      speedEl.textContent = Math.max(0, Math.round(Math.abs(speed) * 185));
      coinsEl.textContent = coins;
      nitroEl.textContent = Math.round(nitro);

      renderer.render(scene, camera);
    }

    function updateCar() {
      const acceleration = 0.028;
      const brake = 0.035;
      const friction = 0.012;
      const maxSpeed = keys.nitro && nitro > 0 ? 2.05 : 1.35;
      const reverseSpeed = -0.45;
      const turnPower = 0.035;

      if (keys.w) speed += acceleration;
      if (keys.s) speed -= brake;

      if (keys.nitro && nitro > 0 && speed > 0.3) {
        speed += 0.035;
        nitro = Math.max(0, nitro - 0.7);
      } else {
        nitro = Math.min(100, nitro + 0.11);
      }

      if (!keys.w && !keys.s) {
        if (speed > 0) speed -= friction;
        if (speed < 0) speed += friction;
        if (Math.abs(speed) < friction) speed = 0;
      }

      speed = THREE.MathUtils.clamp(speed, reverseSpeed, maxSpeed);

      if (Math.abs(speed) > 0.04) {
        if (keys.a) car.rotation.y += turnPower * Math.sign(speed);
        if (keys.d) car.rotation.y -= turnPower * Math.sign(speed);
      }

      car.position.x -= Math.sin(car.rotation.y) * speed;
      car.position.z -= Math.cos(car.rotation.y) * speed;

      car.position.x = THREE.MathUtils.clamp(car.position.x, -5.7, 5.7);
      car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, keys.a ? 0.06 : keys.d ? -0.06 : 0, 0.1);

      if (car.position.y > 0) {
        car.position.y -= 0.035;
        if (car.position.y < 0) car.position.y = 0;
      }
    }

    function updateCamera() {
      const offset = new THREE.Vector3(
        Math.sin(car.rotation.y) * 7,
        4.8 + car.position.y * 0.7,
        Math.cos(car.rotation.y) * 8.8
      );

      camera.position.lerp(car.position.clone().add(offset), 0.08);
      camera.lookAt(car.position.x, car.position.y + 0.9, car.position.z);
    }

    function updateCoins() {
      coins3d.forEach(coin => {
        coin.rotation.z += 0.08;
        if (coin.visible && coin.position.distanceTo(car.position) < 1.5) {
          coin.visible = false;
          coins++;
          nitro = Math.min(100, nitro + 5);
        }
      });
    }

    function updateRampJump() {
      ramps.forEach(ramp => {
        if (ramp.position.distanceTo(car.position) < 1.8 && speed > 0.45) {
          car.position.y = Math.max(car.position.y, 1.1);
          speed += 0.08;
          showMiniMessage("¡Rampa! Salto + velocidad.");
        }
      });
    }

    function checkCollisions() {
      obstacles.forEach(obstacle => {
        if (obstacle.visible && obstacle.position.distanceTo(car.position) < 1.45) {
          speed *= -0.35;
          obstacle.visible = false;
          showMiniMessage("¡Choque! Pierdes velocidad.");
        }
      });
    }

    function updateParticles() {
      const particles = rainParticles || dustParticles;
      if (!particles || !car) return;

      const positions = particles.geometry.attributes.position.array;
      const isRain = currentPack === 1;

      for (let i = 0; i < positions.length; i += 3) {
        positions[i + 1] -= isRain ? 0.35 : 0.035;
        positions[i + 2] += isRain ? 0 : 0.18;

        if (positions[i + 1] < 0 || positions[i + 2] > car.position.z + 30) {
          positions[i + 1] = isRain ? 35 : Math.random() * 8;
          positions[i] = car.position.x + (Math.random() - 0.5) * 80;
          positions[i + 2] = car.position.z + 30 - Math.random() * 190;
        }
      }

      particles.geometry.attributes.position.needsUpdate = true;
    }

    function randomLane() {
      const lanes = [-4, -2, 0, 2, 4];
      return lanes[Math.floor(Math.random() * lanes.length)];
    }

    function onKeyDown(event) {
      const key = event.key.toLowerCase();
      if (key in keys) keys[key] = true;
      if (event.code === "Space") keys.nitro = true;
    }

    function onKeyUp(event) {
      const key = event.key.toLowerCase();
      if (key in keys) keys[key] = false;
      if (event.code === "Space") keys.nitro = false;
    }

    function setupButton(id, key) {
      const btn = document.getElementById(id);

      const press = event => {
        event.preventDefault();
        keys[key] = true;
      };

      const release = event => {
        event.preventDefault();
        keys[key] = false;
      };

      btn.addEventListener("touchstart", press, { passive: false });
      btn.addEventListener("touchend", release, { passive: false });
      btn.addEventListener("touchcancel", release, { passive: false });
      btn.addEventListener("mousedown", press);
      btn.addEventListener("mouseup", release);
      btn.addEventListener("mouseleave", release);
    }

    function showMiniMessage(text) {
      const box = document.getElementById("message");
      box.textContent = text;
      clearTimeout(showMiniMessage.timer);
      showMiniMessage.timer = setTimeout(() => {
        box.textContent = "PC: W/S acelerar-frenar, A/D girar, ESPACIO nitro. Móvil: botones.";
      }, 1500);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
