<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coche Racer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Marcador">
        <div>
          <span class="label">Puntos</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Record</span>
          <strong id="bestScore">0</strong>
        </div>
        <button id="restartButton" type="button">Reiniciar</button>
      </section>

      <canvas id="game" width="420" height="680" aria-label="Juego de coches"></canvas>

      <section class="controls" aria-label="Controles">
        <button id="leftButton" type="button" aria-label="Mover a la izquierda">&lt;</button>
        <button id="pauseButton" type="button">Pausa</button>
        <button id="rightButton" type="button" aria-label="Mover a la derecha">&gt;</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
